<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Aménagement Monzon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d1117;
      color: #f5f5f5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      width: 64px;
      height: 64px;
      background: rgba(212,158,48,0.12);
      border: 1px solid rgba(212,158,48,0.25);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.75rem;
      font-weight: 800;
      color: #d49e30;
      letter-spacing: -1px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p  { color: #8b949e; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: #d49e30;
      color: #0d1117;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #b8861f; }
    .status {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #484f58;
      font-family: 'JetBrains Mono', monospace;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f85149;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>You're Offline</h1>
    <p>Aménagement Monzon is not available right now. Please check your internet connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">
      ↺ &nbsp;Try Again
    </button>
    <p class="status"><span class="dot"></span>No network connection detected</p>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
